name: NEXUS Integration & Compilation CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalar dependencias para el linter si no hay requirements.txt
          pip install sentence-transformers chromadb

      - name: Run FPI Semantic Linter
        run: |
          # Si el linter existe en el repositorio lo ejecutamos
          if [ -f work/fpi_semantic_linter.py ]; then
            python work/fpi_semantic_linter.py
          elif [ -f scripts/fpi_semantic_linter.py ]; then
            python scripts/fpi_semantic_linter.py
          else
            echo "Linter no encontrado. Omitiendo validación."
          fi

      - name: Install Pandoc & LaTeX (for PDF generation)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-xetex texlive-fonts-recommended

      - name: Compile Thesis to APA PDF
        run: |
          # Buscar el archivo de la tesis en la carpeta
          THESIS_FILE=$(find . -name "*MANUSCRITO_TESIS_*.md" | head -n 1)
          if [ -n "$THESIS_FILE" ]; then
            echo "Compilando $THESIS_FILE..."
            pandoc "$THESIS_FILE" -o thesis_output.pdf --pdf-engine=xelatex \
              --metadata title="Manuscrito Tesis" \
              --variable geometry:margin=1in \
              --variable mainfont="DejaVu Sans"
          else
            echo "Archivo de tesis no encontrado."
          fi

      - name: Upload Compiled Thesis PDF
        uses: actions/upload-artifact@v4
        with:
          name: Thesis-APA-PDF
          path: thesis_output.pdf
          if-no-files-found: warn
